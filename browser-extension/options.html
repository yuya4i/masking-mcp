<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Local Mask MCP — 設定</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Local Mask MCP — 設定</h1>
      <span class="version" id="version">v0.4.0</span>
    </header>

    <main>
      <section class="card">
        <h2>マスキング除外リスト</h2>
        <p class="hint">
          ここに登録した値は、PII として検出されてもマスキングされず原文のまま送信されます。
          会社名・プロジェクト名・自分の名前など、マスキング不要だが PII 判定される値を追加してください。
        </p>

        <div class="add-row">
          <input
            type="text"
            id="allowlist-input"
            placeholder="例: Acme Corp, テストユーザー, project-x"
            autofocus
          />
          <button id="allowlist-add-btn" type="button" class="btn-primary">追加</button>
        </div>

        <div class="list-header">
          <span>登録済みエントリ</span>
          <span id="allowlist-count" class="count-badge">0件</span>
        </div>
        <div id="allowlist-entries" class="entries-list"></div>

        <div class="bulk-actions">
          <button id="export-btn" type="button" class="btn-secondary">JSON でエクスポート</button>
          <input type="file" id="import-file" accept=".json" hidden />
          <button id="import-btn" type="button" class="btn-secondary">JSON からインポート</button>
          <button id="clear-btn" type="button" class="btn-danger">全削除</button>
        </div>
      </section>

      <section class="card">
        <h2>動作モード</h2>
        <div class="form-row">
          <label class="form-label" for="opt-enabled">マスキング機能</label>
          <label class="switch">
            <input type="checkbox" id="opt-enabled" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="form-row">
          <label class="form-label" for="opt-interactive">送信前に確認 (インタラクティブ)</label>
          <label class="switch">
            <input type="checkbox" id="opt-interactive" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="form-row">
          <label class="form-label">UI モード</label>
          <fieldset class="radios">
            <label><input type="radio" name="ui-mode" value="sidebar" /> サイドバー (推奨)</label>
            <label><input type="radio" name="ui-mode" value="modal" /> モーダル (従来)</label>
          </fieldset>
        </div>
      </section>

      <section class="card">
        <h2>Gateway</h2>
        <div class="form-row">
          <span class="form-label">接続先</span>
          <code class="endpoint">http://127.0.0.1:8081</code>
        </div>
        <div class="form-row">
          <span class="form-label">ステータス</span>
          <span id="gateway-status" class="status-pill status-unknown">checking…</span>
        </div>
        <a class="link" href="http://127.0.0.1:8081/v1/api" target="_blank" rel="noopener">
          Gateway Swagger UI を開く →
        </a>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
