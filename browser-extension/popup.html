<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>PII Guard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>PII Guard</h1>
      <span id="version">v0.5.0-dev</span>
    </header>

    <section class="row toggle-row">
      <label for="enabled-toggle" class="toggle-label">
        <span>マスキングを有効化</span>
        <input type="checkbox" id="enabled-toggle" />
      </label>
    </section>

    <section class="row toggle-row">
      <label for="interactive-toggle" class="toggle-label">
        <span>送信前に確認 (インタラクティブ)</span>
        <input type="checkbox" id="interactive-toggle" />
      </label>
    </section>

    <section class="row ui-mode-row">
      <span class="label">UI モード</span>
      <fieldset class="ui-mode-radios" id="ui-mode-fieldset">
        <legend class="visually-hidden">UI モード</legend>
        <label class="radio-label">
          <input type="radio" name="ui-mode" value="sidebar" id="ui-mode-sidebar" />
          <span>サイドバー (推奨)</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="ui-mode" value="modal" id="ui-mode-modal" />
          <span>モーダル</span>
        </label>
      </fieldset>
    </section>

    <section class="row">
      <span class="label">エンジン</span>
      <span class="value status-ok">ローカル ✓</span>
    </section>

         Store bundle strips both the UI row and its JS handler. -->
    <section class="row">
      <span class="label">LLM 連携</span>
      <span id="llm-indicator" class="value status-unknown">未設定</span>
    </section>

    <section class="row">
      <span class="label">このタブのマスク件数</span>
      <span id="detections-count" class="value">0</span>
    </section>

    <section class="row allowlist-quick">
      <button id="open-options-btn" type="button" class="open-options">
        ⚙ 詳細設定 / 除外リスト管理
      </button>
    </section>

    <footer>
      <a id="privacy-link" href="https://github.com/yuya4i/pii-masking/blob/main/browser-extension/PRIVACY.md" target="_blank" rel="noopener">
        プライバシーポリシー
      </a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
