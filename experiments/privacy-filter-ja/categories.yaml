# privacy-filter-ja ラベル定義 — 全スクリプトが参照する single source of truth
#
# BIOES スキーム:
#   B-<cat>    begin  — エンティティの先頭トークン
#   I-<cat>    inside — エンティティの中間トークン
#   E-<cat>    end    — エンティティの末尾トークン
#   S-<cat>    single — 1 トークンで完結するエンティティ
#   O          outside (全カテゴリ共通の背景クラス)
#
# ラベル数: 18 cat × 4 BIOES + 1 O = 73
#
# 学習時は prepare.py がこの YAML を読んで id2label / label2id マップを
# 作成し、HF モデルの config に埋める。

# 既存 openai/privacy-filter 由来 (8 種) ----------------------------------
existing_categories:
  - name: account_number
    description: 銀行口座 / クレジットカード / 請求先番号等の識別子
  - name: private_address
    description: 郵便住所 (番地まで含むフル住所)
  - name: private_email
    description: メールアドレス
  - name: private_person
    description: 人名 (姓 / 名 / フルネーム)
  - name: private_phone
    description: 電話番号
  - name: private_url
    description: URL (http / https)
  - name: private_date
    description: 日付 (DOB 候補含む)
  - name: secret
    description: API キー / パスワード / トークン等の認証情報

# 日本語拡張 (10 種) -----------------------------------------------------
japanese_categories:
  - name: private_my_number
    description: マイナンバー (個人番号、12 桁、スペース/ハイフン区切り可)
    examples: ["1234 5678 9012", "123456789012"]
  - name: private_postal_code_jp
    description: 日本の郵便番号 (〒NNN-NNNN、7 桁)
    examples: ["〒107-0061", "100-0001"]
  - name: private_prefecture
    description: 都道府県 (47 種、単体 / 先頭のみ)
    examples: ["東京都", "兵庫県", "北海道"]
  - name: private_company_jp
    description: 日本の法人名 (株式会社 / 有限会社 / 合同会社等の接頭/接尾)
    examples: ["株式会社アクメ", "有限会社テスト", "ACME株式会社"]
  - name: private_driver_license_jp
    description: 運転免許証番号 (12 桁 NN-NN-NNNNNN-NN 形式)
    examples: ["12-34-567890-12"]
  - name: private_passport_jp
    description: 日本のパスポート番号 (2 アルファベット + 7 数字)
    examples: ["AB1234567", "TK9876543"]
  - name: private_annual_income
    description: 年収 / 月収 (金額情報、機密性が高い)
    examples: ["年収1200万円", "月収40万円", "年収 1,500 万円"]
  - name: private_bank_account_jp
    description: 日本の銀行口座 (普通 / 当座 / 貯蓄 + 番号)
    examples: ["普通 1234567", "当座7654321", "普通口座 123-4567"]
  - name: private_patient_id_jp
    description: 医療記録番号 (患者 ID / MRN)
    examples: ["PATIENT-12345", "患者ID: P-77", "MRN 99887"]
  - name: private_employee_id_jp
    description: 社員番号 / スタッフ ID
    examples: ["EMP-12345", "社員番号: E-0042", "STAFF-00123"]

# BIOES タグ ------------------------------------------------------------
bioes_tags:
  - B  # begin
  - I  # inside
  - E  # end
  - S  # single-token entity

# 背景クラス (PII ではない token)
background_label: O
