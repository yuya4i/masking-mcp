# Training config for privacy-filter-ja fine-tune
#
# Tuned for a single RTX 4090 (24 GB VRAM) running full fine-tune of
# the 1.5B parameter model. All paths are resolved relative to the
# experiments/privacy-filter-ja/ directory.

model:
  base_model_id: "openai/privacy-filter"
  # トークナイザも同じ repo の既存版を使用 (日本語 BPE は byte-level なので
  # 再学習不要、未知 token は subword で分解される)
  tokenizer_id: "openai/privacy-filter"

data:
  dataset_dir: "../dataset"         # prepare.py が生成した HF Dataset
  seed_path: "../data/seed.jsonl"
  generated_path: "../data/generated.jsonl"
  val_fraction: 0.05
  max_length: 512                    # token 単位。8k token window あるが短文中心なので 512 で十分

training:
  output_dir: "../checkpoints/run1"
  num_train_epochs: 3
  per_device_train_batch_size: 16    # 4090 24GB で 1.5B + seq 512 なら 16 前後
  per_device_eval_batch_size: 32
  learning_rate: 3.0e-5              # head を伸ばした場合はやや高め
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  gradient_accumulation_steps: 2     # 実効 batch = 32
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  logging_steps: 50
  fp16: false
  bf16: true                         # 4090 は bf16 ネイティブサポート
  dataloader_num_workers: 4
  seed: 42
  metric_for_best_model: "f1"
  greater_is_better: true
  load_best_model_at_end: true
  report_to: ["none"]                # wandb / tensorboard を使うなら変更
